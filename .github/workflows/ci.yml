name: CI

# fmt / clippy / build / doc on the workspace. The full VGI integration suite
# (test/sql/integration/*) is NOT run here — it drives the C++ DuckDB `vgi`
# extension's `unittest` binary against the worker, which isn't available on a
# stock runner. Run it locally with `scripts/run_tests.sh`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-clippy-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (MSRV 1.97)
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # The published `vgi` crate is gated clippy-clean under `-D warnings`.
      # The `vgi-example-worker` fixture binary (publish = false) is not.
      - name: cargo clippy (vgi)
        run: cargo clippy -p vgi --all-targets --all-features -- -D warnings

      # `vgi-example-worker`'s `coverage` feature FFI-links the LLVM profiling
      # runtime (`__llvm_profile_write_file`), which only exists under
      # `-Cinstrument-coverage` (set by the integration `coverage` lane). A plain
      # `--all-features` build would fail to link it, so exclude the fixture from
      # the all-features sweep and build it separately with its default features.
      - name: cargo build (workspace, all features)
        run: cargo build --workspace --exclude vgi-example-worker --all-features

      - name: cargo build (example worker)
        run: cargo build -p vgi-example-worker

      - name: cargo test --doc (vgi)
        run: cargo test --doc -p vgi --all-features

      - name: cargo doc (vgi)
        run: cargo doc -p vgi --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  # Windows has no AF_UNIX launcher transport: the `vgi` crate must still
  # compile (stdio + http transports stay available). Guards against the
  # `serve_unix` AF_UNIX path regressing the cross-platform build.
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (MSRV 1.97)
        uses: dtolnay/rust-toolchain@1.97.0

      - uses: Swatinem/rust-cache@v2

      - name: cargo build (vgi)
        run: cargo build -p vgi --all-features

  # Build AND run every ```rust worker example in the docs end-to-end: each is
  # compiled against the local `vgi`, attached in Haybarn (Query Farm's DuckDB
  # distribution, which provides the `vgi` extension), and its `upper_case`
  # function is exercised. Guarantees the copy-paste examples never drift.
  doc-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (MSRV 1.97)
        uses: dtolnay/rust-toolchain@1.97.0

      - uses: Swatinem/rust-cache@v2

      - name: Install uv (for haybarn-cli)
        uses: astral-sh/setup-uv@v5

      - name: Build and run the doc examples
        run: bash scripts/check_doc_examples.sh

  # Boot the example worker over HTTP and validate the standardized landing
  # surface (GET / landing.html marker, describe.json, lazy columns) against
  # the vendored `test/landing/describe.schema.json`, using the cross-language
  # conformance runner from the canonical Query-farm/vgi repo. The runner only
  # drives HTTP (schema + marker + column endpoints); it is language-agnostic,
  # so the Python-derived golden is intentionally NOT applied to the Rust
  # worker (its catalog differs). The dependency-free Rust guard runs first via
  # the cargo integration test.
  landing-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout canonical vgi (conformance runner)
        uses: actions/checkout@v5
        with:
          repository: Query-farm/vgi
          ref: main
          path: vgi-upstream
          sparse-checkout: |
            test/landing

      - name: Install Rust toolchain (MSRV 1.97)
        uses: dtolnay/rust-toolchain@1.97.0

      - uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Build example worker
        run: cargo build -p vgi-example-worker

      - name: Rust landing conformance guard (cargo test)
        run: cargo test -p vgi-example-worker --test landing_conformance

      - name: Landing conformance (schema + marker + columns)
        run: |
          set -euo pipefail
          ./target/debug/vgi-example-worker --http >/tmp/worker.out 2>/tmp/worker.err &
          WPID=$!
          trap 'kill $WPID 2>/dev/null || true' EXIT
          for _ in $(seq 1 50); do
            PORT=$(grep -o 'PORT:[0-9]*' /tmp/worker.out 2>/dev/null | head -1 | cut -d: -f2 || true)
            [ -n "${PORT:-}" ] && break
            sleep 0.2
          done
          if [ -z "${PORT:-}" ]; then echo "worker did not announce a PORT"; cat /tmp/worker.err; exit 1; fi
          echo "worker on port $PORT"
          python vgi-upstream/test/landing/run_landing_conformance.py \
            --url "http://127.0.0.1:$PORT" \
            --schema test/landing/describe.schema.json
