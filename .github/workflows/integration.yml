# Copyright 2025, 2026 Query Farm LLC - https://query.farm
#
# Runs the canonical Query-farm/vgi integration sqllogictest suite against the
# Rust example worker across three transports (subprocess / launcher / http) and
# three platforms (Linux / macOS / Windows). Rather than building the C++ vgi
# extension from source, it drives a prebuilt standalone `haybarn-unittest` and
# installs the signed vgi extension from the Haybarn community channel. The
# .test files come from a pinned Query-farm/vgi checkout. See ci/README.md.
name: Integration suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  # The Query-farm/vgi commit whose test/sql/integration suite we run. Pinned for
  # reproducibility; bump deliberately and re-validate against the then-current
  # community extension (see ci/README.md).
  VGI_REF: 129aff14afb4419812f9ea3e925188cf661e1753
  # The Haybarn release providing the prebuilt haybarn-unittest binary. Must be
  # ABI-compatible with the community-published vgi extension.
  HAYBARN_RELEASE: haybarn-v1.5.4-rc1

jobs:
  integration:
    name: ${{ matrix.os }} / ${{ matrix.transport }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      # One failure cancels the rest of the matrix.
      fail-fast: true
      matrix:
        include:
          # Linux / macOS — the launcher lane covers the subprocess (stdio) path,
          # so only launch + http run here.
          - { os: ubuntu-latest,  transport: launch, asset: haybarn_unittest-linux-amd64.zip }
          - { os: ubuntu-latest,  transport: http,   asset: haybarn_unittest-linux-amd64.zip }
          - { os: macos-latest,   transport: launch, asset: haybarn_unittest-osx-arm64.zip }
          - { os: macos-latest,   transport: http,   asset: haybarn_unittest-osx-arm64.zip }
          # Windows — the worker's AF_UNIX launcher transport is Unix-only, and
          # the subprocess (stdio) lane is slow (per-query process spawn), so
          # Windows runs the http lane only.
          - { os: windows-latest, transport: http,   asset: haybarn_unittest-windows-amd64.zip }
    steps:
      - name: Checkout vgi-rust
        uses: actions/checkout@v5

      - name: Checkout pinned vgi test suite
        uses: actions/checkout@v5
        with:
          repository: Query-farm/vgi
          ref: ${{ env.VGI_REF }}
          path: vgi-upstream

      - name: Install Rust toolchain (MSRV 1.90)
        uses: dtolnay/rust-toolchain@1.90.0

      - uses: Swatinem/rust-cache@v2

      - name: Build example worker
        run: cargo build --release -p vgi-example-worker

      - name: Download + extract haybarn-unittest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$HAYBARN_RELEASE" --repo Query-farm-haybarn/haybarn \
            --pattern '${{ matrix.asset }}' --output hb.zip --clobber
          python3 -c "import zipfile; zipfile.ZipFile('hb.zip').extractall('hb')"
          ut="$(find hb -type f -name 'haybarn-unittest' -o -type f -name 'haybarn-unittest.exe' | head -1)"
          chmod +x "$ut" 2>/dev/null || true
          echo "HAYBARN_UNITTEST=$(cd "$(dirname "$ut")" && pwd)/$(basename "$ut")" >> "$GITHUB_ENV"

      - name: Resolve worker binary path
        shell: bash
        run: |
          exe=""; [ "$RUNNER_OS" = "Windows" ] && exe=".exe"
          echo "VGI_WORKER_BIN=$(pwd)/target/release/vgi-example-worker${exe}" >> "$GITHUB_ENV"

      - name: Run integration suite (${{ matrix.transport }})
        shell: bash
        run: ci/run-integration.sh
        env:
          VGI_SRC: ${{ github.workspace }}/vgi-upstream
          TRANSPORT: ${{ matrix.transport }}

  # Measure what the VGI integration suite exercises in the worker. Linux only.
  #
  # Runs BOTH the subprocess (stdio) and launcher lanes and merges their
  # profiles. This matters for accuracy: a launcher/http worker is killed at
  # teardown without a clean exit, so counters for code that runs once early
  # (notably bind-time work like overload resolution) can be lost even with the
  # periodic flush — the launcher lane alone under-reports them badly (it read
  # overload.rs at ~8% when the suite actually covers ~95%). The stdio lane
  # spawns a fresh worker per query that exits cleanly (LLVM `atexit` writer), so
  # its counters are reliable; the launch lane adds the pooled-worker / launcher
  # code paths stdio never exercises. Together they give a trustworthy picture.
  coverage:
    name: coverage (worker / Linux stdio+launch)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Checkout pinned vgi test suite
        uses: actions/checkout@v5
        with:
          repository: Query-farm/vgi
          ref: ${{ env.VGI_REF }}
          path: vgi-upstream

      - name: Install Rust toolchain (MSRV 1.90) + llvm-tools
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - name: Build instrumented worker
        run: cargo build --release -p vgi-example-worker --features coverage
        env:
          RUSTFLAGS: -Cinstrument-coverage

      - name: Download + extract haybarn-unittest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$HAYBARN_RELEASE" --repo Query-farm-haybarn/haybarn \
            --pattern 'haybarn_unittest-linux-amd64.zip' --output hb.zip --clobber
          python3 -c "import zipfile; zipfile.ZipFile('hb.zip').extractall('hb')"
          ut="$(find hb -type f -name 'haybarn-unittest' | head -1)"
          chmod +x "$ut"
          echo "HAYBARN_UNITTEST=$(cd "$(dirname "$ut")" && pwd)/$(basename "$ut")" >> "$GITHUB_ENV"

      - name: Run integration suite (stdio) with coverage
        shell: bash
        run: ci/run-integration.sh
        env:
          VGI_SRC: ${{ github.workspace }}/vgi-upstream
          VGI_WORKER_BIN: ${{ github.workspace }}/target/release/vgi-example-worker
          TRANSPORT: stdio
          LLVM_PROFILE_FILE: ${{ github.workspace }}/covdata/stdio-%p-%m.profraw

      - name: Run integration suite (launcher) with coverage
        shell: bash
        run: ci/run-integration.sh
        env:
          VGI_SRC: ${{ github.workspace }}/vgi-upstream
          VGI_WORKER_BIN: ${{ github.workspace }}/target/release/vgi-example-worker
          TRANSPORT: launch
          LLVM_PROFILE_FILE: ${{ github.workspace }}/covdata/launch-%p-%m.profraw

      - name: Merge + report coverage
        if: always()
        shell: bash
        run: ci/coverage-report.sh "${{ github.workspace }}/target/release/vgi-example-worker" "${{ github.workspace }}/covdata" "${{ github.workspace }}/coverage"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-coverage
          path: coverage/
